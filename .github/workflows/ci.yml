name: Aero CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt, clippy, rust-src, llvm-tools-preview

      - name: Install Compilation Targets
        run: |
          rustup target add aarch64-unknown-none
          rustup target add x86_64-unknown-none
          rustup target add riscv64gc-unknown-none-elf

      - name: Build Workspace (aarch64)
        run: cargo build --workspace --target aarch64-unknown-none --profile secure

      - name: Verify Driver Implementations
        run: |
          echo "Verifying driver source files..."
          DRIVER_COUNT=$(find drivers/src -name "*.rs" | grep -v "lib.rs" | grep -v "traits.rs" | wc -l)
          echo "Found $DRIVER_COUNT active drivers."
          if [ "$DRIVER_COUNT" -eq 0 ]; then
            echo "Error: No drivers found in drivers/src/"
            exit 1
          fi
