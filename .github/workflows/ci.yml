name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
          components: rustfmt, clippy, rust-src, llvm-tools-preview

      - name: Install targets
        run: |
          rustup target add aarch64-unknown-none
          rustup target add x86_64-unknown-none
          rustup target add riscv64gc-unknown-none-elf

      - name: Check formatting
        run: |
          rustup component add rustfmt --toolchain nightly-2026-06-01-x86_64-unknown-linux-gnu || true
          cargo fmt --all -- --check || (echo "Formatting issues found, run cargo fmt"; exit 1)

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build - aarch64
        run: cargo build --workspace --target aarch64-unknown-none --profile secure

      - name: Build - x86_64
        run: cargo build --workspace --target x86_64-unknown-none

      - name: Test drivers count
        run: |
          echo "Checking driver manifest"
          wc -l DRIVER_MANIFEST_1000.csv
          test $(wc -l < DRIVER_MANIFEST_1000.csv) -gt 1000
